mutation CompleteProfile($where: ProfileWhereUniqueInput!, $data: ProfileUpdateInput!) {
  updateProfile(where: $where, data: $data) {
  id
  user {
    id
    isProfile
     profile {
      id
      bio,
      age,
      gender,
      education,
      occupation,
      interests,
      lookingFor,
      profilePicture {
        publicUrlTransformed
      }
      photos {
        id
        image {
          publicUrlTransformed
        }
      }
    }
  }
   
  }
}